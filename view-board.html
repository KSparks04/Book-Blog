<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/base.css" rel="stylesheet">
    <link href="css/view-board.css" rel="stylesheet">
    <title></title>
</head>

<body>
    <header id="header">

        <div id="title">
            <h1>TITLE</h1>
        </div>
        <nav id="nav-bar">
            <ul>
                <li class="nav-button"><a id="home" href="home.html">Home</a></li>
                <li class="nav-button"><a id="explore" href="explore.html">Browse</a></li>
                <li class="nav-button hide"><a id="user-posts" href="user-posts.html">My Posts</a></li>
            </ul>
            <div id="user-create">
                <a id="signup">Sign Up</a>
                <a id="login">Login</a>
            </div>

        </nav>
    </header>
    <div class="page">
        <div class="board">
            <header>
                <h2 class="board-title">Board Title</h2>
            </header>
            <div class="post">
                <h3 class="post-title">Example Post Title</h3>
                <!---TODO: Date Posted-->
                <div class="tags">
                    <div class="tag">
                        <a>Example T</a>
                    </div>
                </div>
                <div class="post-content">
                    <!-- Overflow on it -->
                    <p>Example Post Information</p>
                    <a><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-chat" viewBox="0 0 16 16">
                            <path
                                d="M2.678 11.894a1 1 0 0 1 .287.801 11 11 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8 8 0 0 0 8 14c3.996 0 7-2.807 7-6s-3.004-6-7-6-7 2.808-7 6c0 1.468.617 2.83 1.678 3.894m-.493 3.905a22 22 0 0 1-.713.129c-.2.032-.352-.176-.273-.362a10 10 0 0 0 .244-.637l.003-.01c.248-.72.45-1.548.524-2.319C.743 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 3.134 8 7-3.582 7-8 7a9 9 0 0 1-2.347-.306c-.52.263-1.639.742-3.468 1.105" />
                        </svg> Post a comment</a>
                    <a>Read more</a>
                    <div class="post-mentions">
                        <h4>Books mentioned</h4>
                        <button class="mention-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-chevron-down" viewBox="0 0 16 16">
                                <path fill-rule="evenodd"
                                    d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708" />
                            </svg>
                        </button>
                        <div id="book-carousel">
                            <div class="card caro-card">
                                <div class="card-content">
                                    <img src="images/default_image.jpg">
                                    <div class="card-cont">
                                        <div class="card-text">
                                            <p class="card-title">Book Example</p>
                                            <p class="card-details">By Author</p>

                                        </div>

                                    </div>




                                </div>

                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
