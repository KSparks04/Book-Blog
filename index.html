<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/base.css" rel="stylesheet">
    <link href="css/text-styles.css" rel="stylesheet">
    <link href="css/main-home.css" rel="stylesheet">
    <script src="js/main-home.js"></script>
    <title>The Book Blog Club</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>

<body>
    <header id="header">

        <div id="title">
            <a href="index.html"> 
                <img id="logo" src="images/Book Blog  Club Logo Transparent.png" alt="the book blog club logo">
                <!-- <h1>The Book Blog Club</h1> -->
            </a>


        </div>
        <nav id="nav-bar">
            <ul>
                <li class="nav-button"><a id="home" href="index.html">Home</a></li>
                <li class="nav-button"><a id="explore" href="explore.html">Browse</a></li>
                <li class="nav-button hide"><a id="user-posts" href="user-posts.html">My Posts</a></li>
            </ul>
            <div id="user-create">
                <a id="signup">Sign Up</a>
                <a id="login">Login</a>
            </div>

        </nav>
    </header>
    <div id="main-content">
        <div id="feature-box1">
            <div id="explore-box" class="f1">
                <div id="explore-btns">
                    <a href="explore.html">Explore</a>
                </div>

            </div>
            <div id="blog-box" class="f1">
                <div id="blog-btns">
                    <a>Create a new board</a>
                    <a>Create a new post</a>
                </div>

            </div>
        </div>
        <div id="feature-box2">
            <div class="f2">
                <h2>Popular Books</h2>
                <div id="home-books" class="books-carousel">
                    <!--Register event listener for carousel-->
                    <div class="card caro-card hide">
                        <div class="card-content">
                            <img src="images/default_image.jpg">
                            <p class="card-title">Book Example</p>
                            <p class="card-details">By Author</p>

                        </div>

                    </div>




                </div>
            </div>

            <div class="f2">
                <h2>Popular Boards</h2>
                <div id="home-boards" class="boards-carousel">

                    <div class="card card-board caro-card">
                        <div class="card-content-board">
                            <div class="board-img-card"><img src="images/default_image.jpg"></div>
                            <div class="board-text">
                                <p class="card-title">Board Example</p>
                                <p class="card-details">By User</p>

                            </div>


                        </div>
                    </div>

                </div>
            </div>

        </div>

    </div>

</body>

</html>
