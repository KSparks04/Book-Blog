<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/base.css" rel="stylesheet">
    <link href="css/text-styles.css" rel="stylesheet">
    <link href="css/view-book.css" rel="stylesheet">
    <script src="js/view-book.js"></script>
    <title>The Book Blog Club</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>

<body>
    <header id="header">

        <div id="title">
            <a href="index.html">
                <img id="logo" src="images/Book Blog  Club Logo Transparent.png" alt="the book blog club logo">
            </a>
        </div>
        <nav id="nav-bar">
            <ul>
                <li class="nav-button"><a id="home" href="index.html">Home</a></li>
                <li class="nav-button"><a id="explore" href="explore.html">Browse</a></li>
                <li class="nav-button hide"><a id="user-posts" href="user-posts.html">My Posts</a></li>
            </ul>
            <div id="user-create">
                <a id="signup">Sign Up</a>
                <a id="login">Login</a>
            </div>

        </nav>
    </header>
    <main class="main-book-view">
        <div class="book-grid-container">
            <div class="book-cover">
                <img src="images/default_image.jpg" alt="default_image">
            </div>
            <div class="book-content">
                <div class="book-title-section">
                    <h3 class="series title3 title3-italic"></h3>
                    <h1 class="book-title title1"></h1>
                    <h3 class="author title3"></h3>
                </div>

                <div>
                    <a href="#reader-reviews">Rating</a>
                </div>
                <div class="book-descr-box">
                    <p class="book-descr line-clamp">Description -Overflow</p>
                    <button class="toggle-btn">Read more</button>
                </div>

                <div class="genre-box">
                    <h3>Genres</h3>
                    <div class="genre">
                        <ul class="genre-list">
                            
                        </ul>

                    </div>
                </div>

            </div>
        </div>

        <div>
            <div>
                <h3>Reviews - Star Icon</h3>
                <div>
                    <p>Love it or Hate it?</p>
                    <a>Leave a Review</a>
                    <div>
                        <p>Rate this book</p>
                    </div>
                </div>
            </div>
            <hr>
            <div id="reader-reviews">
                <h3>Readers Reviews</h3>
                <p>Select Rating Level - Popout from JS</p>
                <div class="reviews">
                    <div class="review-card">

                    </div>
                </div>
            </div>

        </div>
    </main>
</body>

</html>
