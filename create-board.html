<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/base.css" rel="stylesheet">
    <link href="css/create-board.css" rel="stylesheet">
    <title></title>
</head>
<body>
    <header id="header">

        <div id="title"><h1>TITLE</h1></div>
         <nav id="nav-bar">
            <ul>
                <li class="nav-button"><a id="home" href="index.html" >Home</a></li>
                <li class="nav-button" ><a id="explore" href="explore.html" >Browse</a></li>
                <li class="nav-button hide"><a id="user-posts" href="user-posts.html" >My Posts</a></li>
            </ul>
            <div id="user-create">
                <a id="signup">Sign Up</a>
                <a id="login">Login</a>
            </div>
          
        </nav>
    </header>
    <div>
        <h3>Create a Board</h3>
        <form method="post" id="cr-board" >
            <div id="cr-b-title-create">
                <div id="b-title">
                <label for="board-title">Title</label>
                <input type="text" name="board-title" id="board-title" placeholder="Create a title for your board">
            </div>
            <div id="b-create-btn">
                <button type="submit">Create</button>
            </div>
            </div>
            <div id="background-img-b">
<label for="board-img">Background Image</label>
            <input type="file" name="board-img" id="board-img">
            </div>
            <div id="b-tags">
                <label for="board-tags">Tags</label>
            <input type="text" name="tags" id="board-tags" placeholder="Pick some tags that match your board">
            </div>
            
            
            
        </form>
    </div>

</body>
</html>
